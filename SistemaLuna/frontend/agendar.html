<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Sessão - Clínica Luna</title>
    <meta name="description" content="Página para agendamento de sessões e consultas da Clínica Luna">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/agendar.css">
</head>
<body>
    <header>
        <h1>Clínica Luna de Psicologia</h1>
    </header>
    
    <nav class="top-nav" aria-label="Navegação Principal">
        <button type="button" class="menu-icon" aria-label="Abrir menu lateral">&#9776;</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listar.html">Cadastrar</a></li>
            <li><a href="agenda.html">Pacientes</a></li>
            <li><a href="agendar.html" aria-current="page">Agendar</a></li>
            <li><a href="pagamentos.html">Pagamentos</a></li>
        </ul>
    
        <div class="nav-extra">
            <search>
                <form action="busca.html">
                    <label for="busca-global" style="display:none;">Busca Rápida</label>
                    <input type="search" id="busca-global" placeholder="Busca Rápida">
                </form>
            </search>
            <a href="login.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <main>
        <section class="agendamento-container" aria-labelledby="titulo-agendamento">
            <h2 id="titulo-agendamento">Agendar Sessão</h2>
    
            <form class="form-agendamento" action="#" method="POST">
                <fieldset>
                    <legend>Identificação e Período</legend>
                    <div class="form-group">
                        <label for="paciente">Paciente (Nome ou CPF)</label>
                        <input type="text" id="paciente" name="paciente" placeholder="Digite o nome ou CPF do paciente" required>
                    </div>
        
                    <div class="linha">
                        <div class="form-group">
                            <label for="data-consulta">Data da Consulta</label>
                            <input type="date" id="data-consulta" name="data_consulta" required>
                        </div>
        
                        <div class="form-group">
                            <label for="horario">Horário</label>
                            <input type="time" id="horario" name="horario" required>
                        </div>
                    </div>
                </fieldset>
                
                <fieldset>
                    <legend>Detalhes do Atendimento</legend>
                    <div class="form-group">
                        <label for="tipo-atendimento">Tipo de Atendimento</label>
                        <select id="tipo-atendimento" name="tipo_atendimento" required>
                            <option value="">Selecione</option>
                            <option value="avulso">Pagamento por sessão</option>
                            <option value="pacote">Pacote mensal</option>
                        </select>
                    </div>
        
                    <div class="form-group">
                        <label for="informacoes">Informações adicionais</label>
                        <textarea id="informacoes" name="informacoes" rows="4" placeholder="Observações sobre a sessão..."></textarea>
                    </div>
                </fieldset>
    
                <button type="submit" class="btn-confirmar">Confirmar Agendamento</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Gestão Clínica Luna</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
