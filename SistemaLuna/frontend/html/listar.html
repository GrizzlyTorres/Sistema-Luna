<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Clínica Luna</title>
    <meta name="description" content="Página de cadastro de pacientes">

    <script src="../../js/auth.js"></script>

    <script src="../../js/script.js"></script>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/listar.css">
</head>

<body>
    <header>
        <h1>Clínica Luna de Psicologia</h1>
    </header>

    <nav class="top-nav" aria-label="Navegação Principal">
        <button type="button" class="menu-icon" aria-label="Abrir menu lateral">&#9776;</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listar.html" aria-current="page">Cadastrar</a></li>
            <li><a href="agenda.html">Pacientes</a></li>
            <li><a href="agendar.html">Agendar</a></li>
        </ul>

        <div class="nav-extra">
            <search>
                <form action="agenda.html" method="GET">
                    <label for="busca-global" style="display:none;">Busca Rápida</label>
                    <input type="search" id="busca-global" name="nome" placeholder="Busca Rápida">
                </form>
            </search>
            <a href="login.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <main>
        <section aria-labelledby="titulo-cadastro">
            <h2 id="titulo-cadastro">Cadastro de Pacientes</h2>

            <form action="#" method="POST">
                <fieldset class="form-grid">
                    <legend>Informações Pessoais</legend>
                    <div>
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div>
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>

                    <div>
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" required>
                    </div>

                    <div>
                        <label for="genero">Gênero</label>
                        <select id="genero" name="genero" required>
                            <option value="">Selecione</option>
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="nao-binario">Não-binário</option>
                            <option value="outro">Outro</option>
                            <option value="nao-informado">Prefiro não informar</option>
                        </select>
                    </div>

                    <div>
                        <label for="sexo">Sexo</label>
                        <select id="genero" name="genero" required>
                            <option value="">Selecione</option>
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="outro">Outro</option>
                            <option value="nao-informado">Prefiro não informar</option>
                        </select>
                    </div>
                </fieldset>

                <fieldset class="form-grid">
                    <legend>Meios de Contato</legend>
                    <div>
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" required>
                    </div>

                    <div>
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div>
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco">
                    </div>
                </fieldset>

                <fieldset class="form-grid">
                    <legend>Dados Socioeconômicos e Clínicos</legend>
                    <div>
                        <label for="naturalidade">Naturalidade</label>
                        <input type="text" id="naturalidade" name="naturalidade">
                    </div>

                    <div>
                        <label for="escolaridade">Escolaridade</label>
                        <select id="escolaridade" name="escolaridade">
                            <option value="">Selecione</option>
                            <option value="fundamental">Fundamental</option>
                            <option value="medio">Médio</option>
                            <option value="superior">Superior</option>
                            <option value="pos">Pós-graduação</option>
                        </select>
                    </div>

                    <div>
                        <label for="estado-civil">Estado Civil</label>
                        <select id="estado-civil" name="estado_civil">
                            <option value="">Selecione</option>
                            <option value="solteiro">Solteiro</option>
                            <option value="casado">Casado</option>
                            <option value="divorciado">Divorciado</option>
                            <option value="viuvo">Viúvo</option>
                        </select>
                    </div>

                    <div>
                        <label for="religiao">Religião</label>
                        <input type="text" id="religiao" name="religiao">
                    </div>

                    <div>
                        <label for="indicacao">Indicação</label>
                        <input type="text" id="indicacao" name="indicacao">
                    </div>

                    <div class="full">
                        <label for="observacoes">Observações</label>
                        <textarea id="observacoes" name="observacoes"></textarea>
                    </div>
                </fieldset>

                <div class="full">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
        </section>

        <aside>
            <p>Conteúdo lateral (opcional)</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Gestão Clínica Luna</p>
    </footer>

</body>

</html>
