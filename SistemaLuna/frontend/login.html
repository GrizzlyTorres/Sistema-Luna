<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Luna</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-container">
        <img src="img/Luna-removebg-preview.png" alt="Logo Clínica Luna" class="logo">

        <h2>Login</h2>

        <form action="index.html">
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" value="psicologa@luna.com">
            </div>
        
            <div class="input-group senha-container">
                <label>Senha</label>
                <input type="password" id="senha" value="123456">
                <span class="toggle-senha" onclick="toggleSenha()">Mostrar</span>
            </div>
        
            <button type="submit">Entrar</button>
        </form>

        <div class="footer">
            Sistema interno - Clínica Luna
        </div>
    </main>

    <script>
        function toggleSenha() {
            const input = document.getElementById("senha");
            const toggle = document.querySelector(".toggle-senha");

            if (input.type === "password") {
                input.type = "text";
                toggle.textContent = "Ocultar";
            } else {
                input.type = "password";
                toggle.textContent = "Mostrar";
            }
        }
    </script>
</body>
</html>
