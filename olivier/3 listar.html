<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta name="description" content="Descrição da página aqui">

    <link rel="stylesheet" href="inserir.css">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            margin-top: 20px;
        }
    
        .form-grid div {
            display: flex;
            flex-direction: column;
        }
    
        label {
            font-size: 14px;
            margin-bottom: 5px;
        }
    
        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    
        textarea {
            height: 80px;
            resize: vertical;
        }
    
        .full {
            grid-column: span 3; 
        }
    
        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
    
        button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Clínica Luna de Psicologia</h1>
    </header>
    <nav class="top-nav">
        <div class="menu-icon">&#9776;</div>
    
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listar.html">Cadastrar</a></li>
            <li><a href="agenda.html">Pacientes</a></li>
            <li><a href="agendar.html">Agendar</a></li>
            <li><a href="pagamentos.html">Pagamentos</a></li>
        </ul>
    
        <div class="nav-extra">
            <input type="text" placeholder="Busca Rápida">
            <a href="login.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <main>
        <section>
            <h2>Cadastro de Pacientes</h2>
        
            <form class="form-grid">
                
                <div>
                    <label>Nome</label>
                    <input type="text" name="nome">
                </div>
        
                <div>
                    <label>Data de Nascimento</label>
                    <input type="date" name="nascimento">
                </div>
        
                <div>
                    <label>CPF</label>
                    <input type="text" name="cpf">
                </div>
        
                <div>
                    <label>Telefone</label>
                    <input type="tel" name="telefone">
                </div>
        
                <div>
                    <label>E-mail</label>
                    <input type="email" name="email">
                </div>
        
                <div>
                    <label>Endereço</label>
                    <input type="text" name="endereco">
                </div>
        
                <div>
                    <label>Naturalidade</label>
                    <input type="text" name="naturalidade">
                </div>
        
                <div>
                    <label>Escolaridade</label>
                    <select>
                        <option>Selecione</option>
                        <option>Fundamental</option>
                        <option>Médio</option>
                        <option>Superior</option>
                        <option>Pós-graduação</option>
                    </select>
                </div>
        
                <div>
                    <label>Estado Civil</label>
                    <select>
                        <option>Selecione</option>
                        <option>Solteiro</option>
                        <option>Casado</option>
                        <option>Divorciado</option>
                        <option>Viúvo</option>
                    </select>
                </div>
        
                <div>
                    <label>Religião</label>
                    <input type="text">
                </div>
        
                <div>
                    <label>Indicação</label>
                    <input type="text">
                </div>
        
                <div class="full">
                    <label>Observações</label>
                    <textarea></textarea>
                </div>
        
                <div class="full">
                    <button type="submit">Cadastrar</button>
                </div>
        
            </form>
        </section>
    <aside>
        <p>Conteúdo lateral (opcional)</p>
    </aside>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Listagem de Pacientes Luna</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
