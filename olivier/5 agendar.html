<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta name="description" content="Descrição da página aqui">

    <link rel="stylesheet" href="inserir.css">

    <style>
        .agendamento-container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.agendamento-container h2 {
    margin-bottom: 20px;
    color: #092144;
}

.form-agendamento {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 14px;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.linha {
    display: flex;
    gap: 10px;
}

.linha .form-group {
    flex: 1;
}

.btn-confirmar {
    background-color: #1976d2;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
}

.btn-confirmar:hover {
    background-color: #0d47a1;
}

.form-group select {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
    background-color: white;
}
    </style>

</head>
<body>
    <header>
        <h1>Clínica Luna de Psicologia</h1>
    </header>
    <nav class="top-nav">
        <div class="menu-icon">&#9776;</div>
    
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listar.html">Cadastrar</a></li>
            <li><a href="agenda.html">Pacientes</a></li>
            <li><a href="agendar.html">Agendar</a></li>
            <li><a href="pagamentos.html">Pagamentos</a></li>
        </ul>
    
        <div class="nav-extra">
            <input type="text" placeholder="Busca Rápida">
            <a href="login.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <main>

        <div class="agendamento-container">
    
            <h2>Agendar Sessão</h2>
    
            <form class="form-agendamento">
    
                <div class="form-group">
                    <label>Paciente (Nome ou CPF)</label>
                    <input type="text" placeholder="Digite o nome ou CPF do paciente">
                </div>
    
                <div class="linha">
                    <div class="form-group">
                        <label>Data da Consulta</label>
                        <input type="date">
                    </div>
    
                    <div class="form-group">
                        <label>Horário</label>
                        <input type="time">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tipo de Atendimento</label>
                    <select>
                        <option>Selecione</option>
                        <option>Pagamento por sessão</option>
                        <option>Pacote mensal</option>
                    </select>
                </div>
    
                <div class="form-group">
                    <label>Informações adicionais</label>
                    <textarea rows="4" placeholder="Observações sobre a sessão..."></textarea>
                </div>
    
                <button type="submit" class="btn-confirmar">Confirmar Agendamento</button>
    
            </form>
    
        </div>
    
    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Listagem de Pacientes Luna</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
